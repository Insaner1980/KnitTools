rules:
  - id: knittools-android-allowbackup-enabled
    languages:
      - xml
    severity: ERROR
    message: android:allowBackup="true" sallii sovellusdatan varmuuskopioinnin. Käytä eksplisiittisiä backup-sääntöjä tai poista backup käytöstä.
    patterns:
      - pattern: |
          <application ... android:allowBackup="true" ...>

  - id: knittools-android-cleartext-enabled
    languages:
      - xml
    severity: ERROR
    message: android:usesCleartextTraffic="true" sallii selkokielisen HTTP-liikenteen. Pidä se pois päältä ellei poikkeusta ole erikseen dokumentoitu.
    patterns:
      - pattern: |
          <application ... android:usesCleartextTraffic="true" ...>

  - id: knittools-exported-component-review
    languages:
      - xml
    severity: WARNING
    message: Exported Android-komponentti on julkinen sisääntulopinta. Varmista, että intent-data ja callback-parametrit validoidaan ennen toimintaa.
    patterns:
      - pattern-either:
          - pattern: |
              <activity ... android:exported="true" ...>
          - pattern: |
              <service ... android:exported="true" ...>
          - pattern: |
              <receiver ... android:exported="true" ...>

  - id: knittools-fileprovider-broad-path
    languages:
      - xml
    severity: ERROR
    message: FileProvider-polku näyttää liian leveältä. Käytä vain sovelluksen rajattuja alihakemistoja, älä root/external/path="." -polkuja.
    patterns:
      - pattern-either:
          - pattern: |
              <root-path ...>
          - pattern: |
              <external-path ...>
          - pattern: |
              <files-path ... path="." ...>
          - pattern: |
              <cache-path ... path="." ...>
          - pattern: |
              <external-files-path ... path="." ...>
          - pattern: |
              <external-cache-path ... path="." ...>

  - id: knittools-content-uri-share-without-clipdata
    languages:
      - kotlin
    severity: WARNING
    message: ACTION_SEND-jako lisää content-URI:n EXTRA_STREAMiin ilman ClipDataa samassa Intent-rakenteessa. Lisää ClipData ja lukuoikeus, jotta vastaanottaja saa URI-oikeuden luotettavasti.
    patterns:
      - pattern-inside: |
          Intent(Intent.ACTION_SEND).apply {
            ...
          }
      - pattern: putExtra(Intent.EXTRA_STREAM, ...)
      - pattern-not-inside: |
          Intent(Intent.ACTION_SEND).apply {
            ...
            clipData = ...
            ...
          }

  - id: knittools-ravelry-credential-surface
    languages:
      - kotlin
    severity: WARNING
    message: Ravelry-salaisuus tai Basic Auth -credential kulkee BuildConfigin kautta hyväksyttynä riskinä. Varmista, että config/security-decisions.md pysyy ajan tasalla.
    patterns:
      - pattern-either:
          - pattern: BuildConfig.RAVELRY_BASIC_AUTH_PASSWORD
          - pattern: BuildConfig.RAVELRY_OAUTH2_CLIENT_SECRET

  - id: knittools-ravelry-gradle-secret-gate
    languages:
      - generic
    severity: WARNING
    message: Gradle-buildissä on tietoinen Ravelry-secretien upotusportti. Pidä release-riskipäätös dokumentoituna.
    paths:
      include:
        - app/build.gradle.kts
    patterns:
      - pattern-regex: 'KNITTOOLS_(ALLOW_EMBEDDED_RAVELRY_SECRETS|RAVELRY_(BASIC_AUTH_(USER|PASSWORD)|OAUTH2_CLIENT_SECRET))'

  - id: knittools-log-user-project-state
    languages:
      - kotlin
    severity: WARNING
    message: Lokitus sisältää käyttäjän projektin tai laskurin tilaa. Jätä tämä vain väliaikaiseksi debug-lokitukseksi.
    patterns:
      - pattern-either:
          - pattern: Log.v(..., $MSG)
          - pattern: Log.d(..., $MSG)
          - pattern: Log.i(..., $MSG)
          - pattern: Log.w(..., $MSG)
          - pattern: Log.e(..., $MSG)
          - pattern: android.util.Log.v(..., $MSG)
          - pattern: android.util.Log.d(..., $MSG)
          - pattern: android.util.Log.i(..., $MSG)
          - pattern: android.util.Log.w(..., $MSG)
          - pattern: android.util.Log.e(..., $MSG)
      - metavariable-regex:
          metavariable: $MSG
          regex: (?i).*(project|projectId|count|counter|before=|after=|ravelry|oauth|token|credential|secret|password|billing|purchase|pattern|instruction|ocr|prompt|voice|ai).*
